name: Security Review
on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: thejefflarson/soundcheck-action@e8a28d1cf5739edbb34c5c81c623e552fd7cc0b7  # v2.0.2
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
